name: ios

on:
  push:
    branches: [main]
    paths:
      - "apps/ios/**"
      - ".github/workflows/ios.yml"
  pull_request:
    paths:
      - "apps/ios/**"
      - ".github/workflows/ios.yml"
  workflow_call:

jobs:
  build:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: apps/ios
    steps:
      - uses: actions/checkout@v4

      # Use the image's default (latest-stable) Xcode. The app targets a recent
      # iOS SDK (IPHONEOS_DEPLOYMENT_TARGET), so don't pin an older Xcode here.
      - name: Xcode version
        run: xcodebuild -version

      - name: Build (simulator, no code signing)
        run: |
          set -o pipefail
          xcodebuild \
            -project GymApp.xcodeproj \
            -scheme GymApp \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build
