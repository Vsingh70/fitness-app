name: nightly

on:
  schedule:
    # 06:00 UTC daily
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  api:
    uses: ./.github/workflows/api.yml

  web:
    uses: ./.github/workflows/web.yml

  ios:
    uses: ./.github/workflows/ios.yml

  notify-on-failure:
    needs: [api, web, ios]
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const title = `Nightly CI failed (${context.runId})`;
            const body = [
              `Nightly run on \`${context.ref}\` had at least one failing job.`,
              ``,
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            ].join("\n");
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "ci-flake",
              per_page: 5,
            });
            if (existing.data.some((i) => i.title.startsWith("Nightly CI failed"))) {
              return; // already a tracking issue open
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ["ci-flake"],
            });
