name: api-deploy

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - ".github/workflows/api-deploy.yml"
      - "infra/**"
  workflow_dispatch:

concurrency:
  group: api-deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-api

jobs:
  ci:
    # Wait for the api CI workflow to succeed before deploying.
    uses: ./.github/workflows/api.yml

  build-and-push:
    needs: ci
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      image_ref: ${{ steps.meta.outputs.image_ref }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute image metadata
        id: meta
        run: |
          tag="${GITHUB_SHA::12}"
          repo="${REGISTRY}/${IMAGE_NAME,,}"
          {
            echo "image_tag=${tag}"
            echo "image_repo=${repo}"
            echo "image_ref=${repo}:${tag}"
            echo "image_latest=${repo}:latest"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          file: apps/api/Dockerfile
          push: true
          build-args: |
            GIT_SHA=${{ steps.meta.outputs.image_tag }}
          tags: |
            ${{ steps.meta.outputs.image_ref }}
            ${{ steps.meta.outputs.image_latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://${{ vars.APP_DOMAIN }}
    steps:
      - name: Trigger app-deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          # The systemd unit pulls the new image and rolls. The unit's
          # ExecStart polls /v1/health/ready so a failed rollout produces
          # a non-zero exit, which SSH surfaces back to the runner.
          script: |
            set -euo pipefail
            sudo systemctl start gymapp-app-deploy.service
            # `start` for a oneshot unit returns when the script finishes.
            # systemctl exits 0 even if the unit failed, so check the unit state.
            state=$(systemctl show gymapp-app-deploy.service --property=Result --value)
            if [ "$state" != "success" ]; then
              echo "::error::gymapp-app-deploy.service reported Result=${state}"
              journalctl -u gymapp-app-deploy.service --no-pager -n 200
              exit 1
            fi

  notify:
    needs: [build-and-push, deploy]
    if: always()
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
    steps:
      - name: Post Discord notification
        if: ${{ env.DISCORD_WEBHOOK_URL != '' }}
        env:
          STATUS: ${{ needs.deploy.result }}
          IMAGE: ${{ needs.build-and-push.outputs.image_ref }}
          SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ "$STATUS" = "success" ]; then
            color=3066993
            title=":white_check_mark: API deployed"
          else
            color=15158332
            title=":x: API deploy failed"
          fi
          curl -sS -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg title "$title" \
              --arg image "$IMAGE" \
              --arg sha "${SHA:0:12}" \
              --arg actor "$ACTOR" \
              --arg url "$RUN_URL" \
              --argjson color "$color" \
              '{embeds: [{title: $title, color: $color, fields: [
                {name: "image", value: $image, inline: false},
                {name: "sha", value: $sha, inline: true},
                {name: "actor", value: $actor, inline: true}
              ], url: $url}]}')" \
            "$DISCORD_WEBHOOK_URL"
