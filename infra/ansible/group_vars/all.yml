---
# Non-secret defaults. Secrets live in group_vars/all/vault.yml encrypted
# with `ansible-vault`. Override per-environment in inventory.

ops_user: ops
ops_uid: 2000
# Public keys authorized for the `ops` user. MUST be non-empty before the
# first run — the base role disables root SSH, so an empty list locks you out.
ops_authorized_keys:
  - "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIGGCM8hp3O4wsujrvq12HNseXKsi3H7qTdHDZvdnhtNy gymapp-deploy-vs"

# IPs fail2ban will NEVER ban (your admin/home IP). Prevents SSH lockout from a
# few failed key attempts. Update if your IP changes; CIDR or bare IPs both work.
# Your ISP rotates within 72.158.128.0/18, so the range is whitelisted.
fail2ban_ignoreips:
  - "72.158.128.0/18"

swap_size_mb: 4096

postgres_image: "postgres:16"
postgres_data_dir: /var/lib/gymapp/postgres
postgres_db: gym
postgres_user: gym
postgres_port: 5432

redis_image: "redis:7"
redis_data_dir: /var/lib/gymapp/redis
redis_port: 6379

ollama_models:
  - "qwen2.5:7b-instruct"
  - "llava-llama3:8b"

app_image: "ghcr.io/vsingh70/fitness-app-api:latest"
# GitHub username for GHCR login (the PAT itself goes in the vault as
# vault_ghcr_token). Leave vault_ghcr_token empty to skip login (public image).
ghcr_username: "Vsingh70"
app_data_dir: /var/lib/gymapp
app_meal_photos_dir: /var/lib/gymapp/meal-photos
app_port: 8000

# Free domain via sslip.io: 178-156-183-7.sslip.io auto-resolves to the VPS IP,
# so Caddy can get a real (trusted) Let's Encrypt cert at $0. internal_tls=false
# switches Caddy from self-signed to Let's Encrypt for app_domain (set in inventory).
app_use_internal_tls: false
app_address: "178.156.183.7"

backup_dir: /var/lib/gymapp/backups
backup_b2_remote: "b2:gymapp-backups"
backup_retention_daily: 14
backup_retention_weekly: 8
backup_retention_monthly: 12

monitoring_node_exporter_version: "1.8.2"
monitoring_promtail_version: "3.2.1"
monitoring_loki_endpoint: "https://logs-prod-us-central1.grafana.net/loki/api/v1/push"
monitoring_postgres_exporter_image: "prometheuscommunity/postgres-exporter:v0.16.0"
monitoring_redis_exporter_image: "oliver006/redis_exporter:v1.62.0"
monitoring_postgres_exporter_port: 9187
monitoring_redis_exporter_port: 9121
