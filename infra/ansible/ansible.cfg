[defaults]
inventory = inventory.ini
roles_path = roles
host_key_checking = True
forks = 5
# The old `community.general.yaml` stdout callback was removed in
# community.general 12.x. Use the built-in default callback with YAML output.
result_format = yaml
deprecation_warnings = True
interpreter_python = auto_silent
retry_files_enabled = False

[ssh_connection]
pipelining = True
control_path = ~/.ssh/ansible-%%r@%%h:%%p
