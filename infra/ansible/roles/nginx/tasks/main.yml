---
# We use Caddy (not nginx) for HTTPS termination since it bundles auto-TLS.
# The role name is kept as "nginx" to match the spec but the binary is Caddy.

- name: Install Caddy apt prerequisites
  ansible.builtin.apt:
    name:
      - debian-keyring
      - debian-archive-keyring
      - apt-transport-https
    state: present

- name: Add Caddy signing key
  ansible.builtin.get_url:
    url: https://dl.cloudsmith.io/public/caddy/stable/gpg.key
    dest: /etc/apt/keyrings/caddy-stable.asc
    mode: "0644"
    force: true

- name: Add Caddy apt repo
  ansible.builtin.apt_repository:
    repo: >-
      deb [signed-by=/etc/apt/keyrings/caddy-stable.asc]
       https://dl.cloudsmith.io/public/caddy/stable/deb/debian any-version main
    filename: caddy
    state: present

- name: Install Caddy
  ansible.builtin.apt:
    name: caddy
    state: present
    update_cache: true

- name: Render Caddyfile
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: /etc/caddy/Caddyfile
    owner: root
    group: caddy
    mode: "0640"
    validate: "caddy validate --config %s --adapter caddyfile"
  notify: reload caddy

- name: Enable + start Caddy
  ansible.builtin.systemd:
    name: caddy
    enabled: true
    state: started
