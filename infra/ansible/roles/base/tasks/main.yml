---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Ensure time sync is enabled (systemd-timesyncd, built into Ubuntu 24.04)
  # Replaces the obsolete `ntp` package, which conflicts with the
  # systemd-timesyncd that ships providing the `time-daemon` virtual package.
  ansible.builtin.systemd:
    name: systemd-timesyncd
    enabled: true
    state: started

- name: Install base packages
  ansible.builtin.apt:
    name:
      - ufw
      - fail2ban
      - unattended-upgrades
      - curl
      - ca-certificates
      - gnupg
      - python3-pip
      - python3-passlib
      - sudo
      - htop
      - jq
      - rsync
      - logrotate
    state: present

- name: Configure unattended security upgrades
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/50unattended-upgrades
    mode: "0644"
    content: |
      Unattended-Upgrade::Allowed-Origins {
        "${distro_id}:${distro_codename}-security";
      };
      Unattended-Upgrade::Automatic-Reboot "false";
      Unattended-Upgrade::Remove-Unused-Dependencies "true";
      Unattended-Upgrade::Remove-Unused-Kernel-Packages "true";
  notify: restart unattended-upgrades

- name: Enable apt periodic
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    mode: "0644"
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";

- name: Ensure non-root ops user exists
  ansible.builtin.user:
    name: "{{ ops_user }}"
    uid: "{{ ops_uid }}"
    shell: /bin/bash
    create_home: true
    groups: sudo
    append: true

- name: Authorize ops_user SSH keys
  ansible.posix.authorized_key:
    user: "{{ ops_user }}"
    key: "{{ item }}"
    state: present
  loop: "{{ ops_authorized_keys }}"
  when: ops_authorized_keys | length > 0

- name: Configure passwordless sudo for ops_user
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/{{ ops_user }}"
    mode: "0440"
    content: "{{ ops_user }} ALL=(ALL) NOPASSWD:ALL\n"
    validate: /usr/sbin/visudo -cf %s

- name: SSH hardening
  ansible.builtin.copy:
    dest: /etc/ssh/sshd_config.d/10-hardening.conf
    mode: "0644"
    content: |
      PermitRootLogin no
      PasswordAuthentication no
      ChallengeResponseAuthentication no
      KbdInteractiveAuthentication no
      X11Forwarding no
      AllowTcpForwarding no
      ClientAliveInterval 300
      ClientAliveCountMax 2
      MaxAuthTries 3
  notify: restart sshd

- name: UFW default policies
  community.general.ufw:
    direction: "{{ item.direction }}"
    policy: "{{ item.policy }}"
  loop:
    - { direction: incoming, policy: deny }
    - { direction: outgoing, policy: allow }

- name: UFW allow SSH/HTTPS/HTTP
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop:
    - 22
    - 80
    - 443

- name: UFW enabled
  community.general.ufw:
    state: enabled
    logging: "on"

- name: Configure fail2ban for sshd
  ansible.builtin.copy:
    dest: /etc/fail2ban/jail.d/sshd.local
    mode: "0644"
    content: |
      [sshd]
      enabled = true
      maxretry = 6
      findtime = 10m
      bantime = 10m
      # Never ban loopback or the operator IPs in fail2ban_ignoreips. Add your
      # admin/home IP(s) to that var so a few failed key attempts don't lock you
      # out (recovery then requires the Hetzner console). bantime kept short.
      ignoreip = 127.0.0.1/8 ::1 {{ fail2ban_ignoreips | default([]) | join(' ') }}
  notify: restart fail2ban

# Time sync is handled by systemd-timesyncd (enabled at the top of this role).
# The old `ntp` service task was removed — `ntp` conflicts with timesyncd on
# Ubuntu 24.04 and is no longer installed.

- name: Provision swap file
  ansible.builtin.command:
    cmd: "fallocate -l {{ swap_size_mb }}M /swapfile"
    creates: /swapfile

- name: Lock down swap file perms
  ansible.builtin.file:
    path: /swapfile
    owner: root
    group: root
    mode: "0600"

- name: Make swap
  ansible.builtin.command: mkswap /swapfile
  args:
    creates: /var/lib/.swap-initialized
  register: mkswap_result

- name: Mark swap initialized
  ansible.builtin.file:
    path: /var/lib/.swap-initialized
    state: touch
    mode: "0644"
  when: mkswap_result is changed

# Swap is activated with `swapon`, not a filesystem mount. The mount module's
# `state: mounted` tries a real mount() syscall, which fails for swap on newer
# ansible.posix. Persist the fstab entry (state: present) and swapon directly.
- name: Ensure swap entry in fstab
  ansible.posix.mount:
    name: none
    src: /swapfile
    fstype: swap
    opts: sw
    state: present

- name: Check whether swap is already active
  ansible.builtin.command: swapon --show=NAME --noheadings
  register: swap_active
  changed_when: false

- name: Activate swap
  ansible.builtin.command: swapon /swapfile
  when: "'/swapfile' not in swap_active.stdout"
