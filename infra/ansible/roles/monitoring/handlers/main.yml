---
- name: reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: restart node_exporter
  ansible.builtin.systemd:
    name: node_exporter
    state: restarted

- name: restart promtail
  ansible.builtin.systemd:
    name: promtail
    state: restarted

- name: restart exporters
  ansible.builtin.systemd:
    name: gymapp-exporters.service
    state: restarted
