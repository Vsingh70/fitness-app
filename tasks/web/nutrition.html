<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nutrition · gym</title>
  <link rel="stylesheet" href="assets/tokens.css" />
  <link rel="stylesheet" href="assets/app.css" />
  <style>
    /* Daily ring + macros */
    .nutri-hero {
      padding: 20px 24px;
      background:
        radial-gradient(700px 280px at 100% 0%, var(--color-accent-soft), transparent 60%),
        var(--color-surface-elevated);
      border: 1px solid var(--color-border);
      border-radius: 16px;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 32px;
      align-items: center;
    }
    @media (max-width: 700px) { .nutri-hero { grid-template-columns: 1fr; gap: 16px; padding: 16px; } }
    .nutri-ring { width: 180px; height: 180px; position: relative; }
    .nutri-ring .num { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .nutri-ring .num .big { font-family: var(--font-rounded); font-size: 36px; font-weight: 600; letter-spacing: -0.02em; font-variant-numeric: tabular-nums; line-height: 1; }
    .nutri-ring .num .sm { font-size: 12px; color: var(--color-text-tertiary); margin-top: 6px; }

    .macro-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; }
    @media (max-width: 700px) { .macro-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; } }
    .macro { display: flex; flex-direction: column; gap: 6px; }
    .macro .lab { font-size: 11px; color: var(--color-text-tertiary); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; }
    .macro .v { font-family: var(--font-rounded); font-size: 22px; font-weight: 600; font-variant-numeric: tabular-nums; letter-spacing: -0.01em; }
    .macro .v .u { font-size: 11px; color: var(--color-text-secondary); margin-left: 4px; font-weight: 500; }
    .macro .target { font-size: 11px; color: var(--color-text-tertiary); }
    .macro .bar { height: 5px; background: var(--color-surface); border-radius: 999px; overflow: hidden; }
    .macro .bar .fill { height: 100%; border-radius: 999px; }
    .macro.protein .bar .fill { background: var(--color-accent); }
    .macro.carbs .bar .fill { background: var(--color-warning); }
    .macro.fat .bar .fill { background: var(--color-success); }
    .macro.fiber .bar .fill { background: var(--color-text-tertiary); }

    .meal-section { margin-top: 24px; }
    .meal-head { display: flex; align-items: center; justify-content: space-between; margin: 0 4px 10px; }
    .meal-head h3 { font-size: 14px; font-weight: 600; margin: 0; color: var(--color-text); letter-spacing: -0.005em; display: flex; align-items: center; gap: 10px; }
    .meal-head h3 .time { font-size: 11px; color: var(--color-text-tertiary); font-weight: 500; }
    .meal-head .kcal { font-size: 12px; color: var(--color-text-secondary); font-variant-numeric: tabular-nums; font-family: var(--font-rounded); font-weight: 600; }

    .item-row {
      display: grid;
      grid-template-columns: 24px 1fr 60px 60px 60px 60px 28px;
      gap: 12px;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid var(--color-border);
      font-size: 13px;
    }
    .item-row:last-child { border-bottom: none; }
    .item-row .src { width: 22px; height: 22px; border-radius: 6px; display: grid; place-items: center; background: var(--color-surface); color: var(--color-text-tertiary); }
    .item-row .name { font-weight: 500; }
    .item-row .brand { color: var(--color-text-tertiary); font-size: 11px; margin-top: 2px; }
    .item-row .qty { color: var(--color-text-secondary); font-variant-numeric: tabular-nums; }
    .item-row .num { font-family: var(--font-rounded); font-variant-numeric: tabular-nums; text-align: right; font-weight: 600; font-size: 13px; }
    .item-row .del { color: var(--color-text-tertiary); cursor: pointer; padding: 4px; }
    .item-row .del:hover { color: var(--color-destructive); }
    .item-row .head-cell { font-size: 10px; color: var(--color-text-tertiary); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; }

    .empty-meal { padding: 24px; text-align: center; color: var(--color-text-tertiary); font-size: 13px; }

    .add-meal-cta {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 12px;
      background: transparent;
      border: 1px dashed var(--color-border-strong);
      border-radius: 10px;
      color: var(--color-text-tertiary);
      font-weight: 500; font-size: 13px;
      cursor: pointer;
      font-family: inherit;
      transition: var(--motion-fast);
    }
    .add-meal-cta:hover { border-color: var(--color-accent); color: var(--color-accent); background: var(--color-accent-soft); }

    /* Floating + button (mobile-style, also nice on web) */
    .fab {
      position: fixed; bottom: 24px; right: 24px;
      width: 56px; height: 56px; border-radius: 999px;
      background: var(--color-accent); color: var(--color-accent-foreground);
      box-shadow: var(--shadow-3);
      display: grid; place-items: center; cursor: pointer;
      border: none;
      z-index: 20;
      transition: var(--motion-fast);
    }
    .fab:hover { transform: scale(1.05); }
    @media (max-width: 820px) { .fab { bottom: 84px; } }

    /* Sheet */
    .sheet-backdrop {
      position: fixed; inset: 0; background: var(--color-overlay);
      backdrop-filter: blur(6px);
      display: grid; place-items: flex-end;
      z-index: 30;
    }
    .sheet {
      width: 100%; max-width: 540px;
      background: var(--color-surface-elevated);
      border-radius: var(--radius-sheet) var(--radius-sheet) 0 0;
      box-shadow: var(--shadow-3);
      padding: 0 0 24px;
      max-height: 86vh;
      overflow: hidden;
      display: flex; flex-direction: column;
      margin: auto;
      animation: sheetUp 320ms var(--motion-spring);
    }
    @media (min-width: 600px) {
      .sheet-backdrop { place-items: center; padding: 24px; }
      .sheet { border-radius: var(--radius-sheet); max-height: 80vh; }
    }
    @keyframes sheetUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    .sheet-handle { width: 38px; height: 4px; background: var(--color-border-strong); border-radius: 999px; margin: 12px auto 4px; }
    .sheet-head { padding: 12px 20px 0; display: flex; align-items: center; justify-content: space-between; }
    .sheet-head h3 { margin: 0; font-size: 17px; font-weight: 600; }
    .sheet-tabs { display: flex; gap: 4px; padding: 14px 20px 0; border-bottom: 1px solid var(--color-border); margin-bottom: 0; }
    .sheet-tabs button {
      padding: 10px 4px;
      background: transparent; border: none;
      font-family: inherit; font-size: 13px; font-weight: 500; color: var(--color-text-secondary);
      border-bottom: 2px solid transparent;
      cursor: pointer;
      margin-right: 16px;
    }
    .sheet-tabs button.active { color: var(--color-accent); border-bottom-color: var(--color-accent); font-weight: 600; }

    .sheet-body { padding: 16px 20px; overflow-y: auto; flex: 1; }

    .search-box { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: var(--color-surface); border-radius: 10px; border: 1px solid var(--color-border); margin-bottom: 12px; }
    .search-box input { flex: 1; border: none; background: transparent; outline: none; font-family: inherit; font-size: 14px; color: var(--color-text); }
    .search-box svg { color: var(--color-text-tertiary); }

    .food-row { display: grid; grid-template-columns: 1fr auto; gap: 12px; padding: 12px 4px; border-bottom: 1px solid var(--color-border); cursor: pointer; }
    .food-row:hover { background: var(--color-surface); border-radius: 8px; }
    .food-row .nm { font-size: 14px; font-weight: 500; }
    .food-row .meta { font-size: 11px; color: var(--color-text-tertiary); margin-top: 2px; }
    .food-row .nums { font-family: var(--font-rounded); font-size: 13px; font-variant-numeric: tabular-nums; text-align: right; }

    /* Scan */
    .scanner {
      aspect-ratio: 4/3;
      background:
        linear-gradient(180deg, oklch(0.16 0 0), oklch(0.20 0 0));
      border-radius: 12px;
      position: relative;
      overflow: hidden;
      display: grid; place-items: center;
      color: oklch(0.7 0 0);
    }
    .scanner .frame {
      width: 80%; aspect-ratio: 5/3;
      border: 2px solid var(--color-accent);
      border-radius: 8px;
      box-shadow: 0 0 0 9999px oklch(0.16 0 0 / 0.55);
      position: relative;
    }
    .scanner .frame::before {
      content: ""; position: absolute; left: 0; right: 0; height: 2px; background: var(--color-accent);
      box-shadow: 0 0 12px var(--color-accent);
      animation: scan 1.6s var(--motion-spring) infinite alternate;
    }
    @keyframes scan { from { top: 4%; } to { top: 92%; } }

    /* Photo flow */
    .photo-frame {
      aspect-ratio: 4/3;
      background:
        linear-gradient(135deg, oklch(0.55 0.05 50), oklch(0.45 0.10 30));
      border-radius: 12px;
      display: grid; place-items: center;
      color: white; font-size: 13px;
      position: relative; overflow: hidden;
    }
    .photo-frame .ph {
      padding: 18px 22px; border-radius: 99px; background: rgba(255,255,255,0.18); backdrop-filter: blur(8px);
      font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.06em;
    }
    .photo-suggested { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; }
    .photo-suggested .item {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 12px;
      padding: 12px;
      background: var(--color-surface);
      border-radius: 10px;
      align-items: center;
    }
    .photo-suggested .nm { font-size: 13px; font-weight: 500; }
    .photo-suggested .meta { font-size: 11px; color: var(--color-text-tertiary); margin-top: 1px; }
    .photo-suggested .qty-input { width: 70px; height: 32px; border-radius: 8px; border: 1px solid var(--color-border); background: var(--color-surface-elevated); padding: 0 8px; font-family: var(--font-rounded); font-weight: 500; text-align: center; }
    .photo-suggested .cb { width: 22px; height: 22px; border-radius: 6px; border: 1.5px solid var(--color-border-strong); background: var(--color-surface-elevated); display: grid; place-items: center; cursor: pointer; color: transparent; }
    .photo-suggested .cb.on { background: var(--color-accent); border-color: transparent; color: white; }
  </style>
</head>
<body data-page="nutrition">
  <div id="app-root" data-title="Nutrition" data-crumb="Tuesday, May 27">
    <div class="page">
      <!-- Hero: ring + macros -->
      <div class="nutri-hero">
        <div class="nutri-ring">
          <svg width="180" height="180" viewBox="0 0 180 180">
            <circle cx="90" cy="90" r="74" fill="none" stroke="var(--color-border)" strokeWidth="14"/>
            <circle cx="90" cy="90" r="74" fill="none" stroke="var(--color-accent)" stroke-width="14" stroke-linecap="round" stroke-dasharray="464.96" stroke-dashoffset="185.98" transform="rotate(-90 90 90)"/>
          </svg>
          <div class="num">
            <div class="big">1,620</div>
            <div class="sm">of 2,680 kcal</div>
          </div>
        </div>

        <div>
          <div class="macro-grid">
            <div class="macro protein">
              <span class="lab">Protein</span>
              <div class="v">134<span class="u">g</span></div>
              <div class="bar"><div class="fill" style="width:67%"></div></div>
              <span class="target">of 200 g · need 66g</span>
            </div>
            <div class="macro carbs">
              <span class="lab">Carbs</span>
              <div class="v">168<span class="u">g</span></div>
              <div class="bar"><div class="fill" style="width:56%"></div></div>
              <span class="target">of 300 g</span>
            </div>
            <div class="macro fat">
              <span class="lab">Fat</span>
              <div class="v">51<span class="u">g</span></div>
              <div class="bar"><div class="fill" style="width:64%"></div></div>
              <span class="target">of 80 g</span>
            </div>
            <div class="macro fiber">
              <span class="lab">Fiber</span>
              <div class="v">22<span class="u">g</span></div>
              <div class="bar"><div class="fill" style="width:63%"></div></div>
              <span class="target">of 35 g</span>
            </div>
          </div>
          <div style="margin-top: 16px; display: flex; gap: 18px; font-size: 12px; color: var(--color-text-tertiary);">
            <span><b style="color: var(--color-text-secondary); font-variant-numeric: tabular-nums;">1,060</b> kcal remaining</span>
            <span><b style="color: var(--color-text-secondary); font-variant-numeric: tabular-nums;">68%</b> of protein goal</span>
            <span><b style="color: var(--color-text-secondary);">Cut block</b> active · −300 kcal vs maintenance</span>
          </div>
        </div>
      </div>

      <div id="meals-mount"></div>
    </div>
  </div>

  <button class="fab" id="fab" aria-label="Add meal">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
  </button>

  <div id="sheet-mount"></div>

  <script src="assets/data.js"></script>
  <script src="assets/chrome.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" data-presets="env,react">
    const { useState, useMemo } = React;
    const MEALS_INIT = window.MOCK.nutrition.meals;
    const MEAL_LABELS = { breakfast: "Breakfast", lunch: "Lunch", dinner: "Dinner", snack: "Snack" };

    const SrcIcon = ({ s }) => {
      const map = {
        usda: <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2 14.4 9.5 22 9.6l-6.2 4.6 2.3 7.5L12 17.3 5.9 21.7l2.3-7.5L2 9.6l7.6-.1z"/></svg>,
        barcode: <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6"><path d="M4 6v12M7 6v12M10 6v12M13 6v12M16 6v12M19 6v12M22 6v12"/></svg>,
        photo: <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6"><rect x="3" y="6" width="18" height="14" rx="2"/><circle cx="12" cy="13" r="3.5"/><path d="M8 6l1.5-2h5L16 6"/></svg>,
        manual: <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6"><path d="M14 4l6 6L8 22H2v-6z"/></svg>,
      };
      return map[s] || null;
    };

    function Item({ it, onDel }) {
      return (
        <div className="item-row">
          <span className="src"><SrcIcon s={it.source} /></span>
          <div>
            <div className="name">{it.name}</div>
            {it.brand && <div className="brand">{it.brand}</div>}
          </div>
          <span className="qty">{it.grams}g</span>
          <span className="num">{it.kcal}</span>
          <span className="num" style={{ color: "var(--color-accent)" }}>{it.p}p</span>
          <span className="num" style={{ color: "var(--color-text-secondary)" }}>{it.c}c · {it.f}f</span>
          <span className="del" onClick={onDel}>×</span>
        </div>
      );
    }

    function MealSection({ meal, onAdd, onDel }) {
      const totals = meal.items.reduce((a, i) => ({ kcal: a.kcal + i.kcal, p: a.p + i.p, c: a.c + i.c, f: a.f + i.f }), { kcal: 0, p: 0, c: 0, f: 0 });
      return (
        <div className="meal-section">
          <div className="meal-head">
            <h3>{MEAL_LABELS[meal.type]} <span className="time">{meal.at}</span></h3>
            <div className="kcal">{totals.kcal} kcal · {totals.p}p · {totals.c}c · {totals.f}f</div>
          </div>
          <div className="card">
            {meal.items.length === 0 && <div className="empty-meal">No items. Tap + to log {MEAL_LABELS[meal.type].toLowerCase()}.</div>}
            {meal.items.map((it, i) => <Item key={i} it={it} onDel={() => onDel(meal.type, i)} />)}
            <div style={{ padding: meal.items.length === 0 ? "0 12px 12px" : "10px 12px 12px" }}>
              <button className="add-meal-cta" onClick={() => onAdd(meal.type)}>+ Add to {MEAL_LABELS[meal.type].toLowerCase()}</button>
            </div>
          </div>
        </div>
      );
    }

    const FOOD_RESULTS = [
      { name: "Chicken breast, grilled", brand: "USDA", kcal_100: 165, p_100: 31, c_100: 0, f_100: 4, src: "usda" },
      { name: "Whey isolate, vanilla", brand: "Optimum Nutrition", kcal_100: 390, p_100: 80, c_100: 7, f_100: 3, src: "barcode" },
      { name: "Greek yogurt, 2%", brand: "Fage", kcal_100: 65, p_100: 9, c_100: 4, f_100: 2, src: "barcode" },
      { name: "Banana, raw", brand: "USDA", kcal_100: 89, p_100: 1, c_100: 23, f_100: 0, src: "usda" },
      { name: "Almonds, raw", brand: "USDA", kcal_100: 579, p_100: 21, c_100: 22, f_100: 50, src: "usda" },
      { name: "Egg, whole", brand: "USDA", kcal_100: 155, p_100: 13, c_100: 1, f_100: 11, src: "usda" },
    ];
    const PHOTO_SUGGESTIONS = [
      { name: "Chicken thigh, grilled", grams: 180, kcal: 369, p: 47, c: 0, f: 20, confidence: 0.92, on: true },
      { name: "Jasmine rice", grams: 200, kcal: 260, p: 5, c: 56, f: 0, confidence: 0.86, on: true },
      { name: "Mixed greens", grams: 80, kcal: 14, p: 1, c: 3, f: 0, confidence: 0.78, on: true },
      { name: "Olive oil drizzle", grams: 10, kcal: 88, p: 0, c: 0, f: 10, confidence: 0.62, on: false },
    ];

    function App() {
      const [meals, setMeals] = useState(MEALS_INIT.map(m => ({ ...m, items: [...m.items] })));
      const [sheet, setSheet] = useState(null); // { type, tab }
      const [q, setQ] = useState("");

      const openAdd = (type) => setSheet({ type, tab: "search" });
      React.useEffect(() => {
        // FAB opens an empty meal section if any, else lunch
        const fab = document.getElementById("fab");
        const onClick = () => {
          const empty = meals.find(m => m.items.length === 0);
          openAdd(empty ? empty.type : "snack");
        };
        fab.addEventListener("click", onClick);
        return () => fab.removeEventListener("click", onClick);
      }, [meals]);
      const close = () => setSheet(null);
      const delItem = (type, idx) => setMeals(prev => prev.map(m => m.type === type ? { ...m, items: m.items.filter((_, i) => i !== idx) } : m));
      const addItem = (type, food) => {
        setMeals(prev => prev.map(m => m.type === type ? { ...m, items: [...m.items, food] } : m));
        close();
      };

      // photo suggestions are local state on the sheet
      const [photoItems, setPhotoItems] = useState(PHOTO_SUGGESTIONS);
      const togglePhoto = (i) => setPhotoItems(p => p.map((x, j) => j === i ? { ...x, on: !x.on } : x));
      const setPhotoGrams = (i, g) => setPhotoItems(p => p.map((x, j) => j === i ? { ...x, grams: +g || 0, kcal: Math.round((g / 100) * (x.kcal / x.grams * 100) || 0) } : x));
      const savePhoto = () => {
        const type = sheet.type;
        const picks = photoItems.filter(p => p.on).map(p => ({ name: p.name, grams: p.grams, kcal: p.kcal, p: p.p, c: p.c, f: p.f, source: "photo" }));
        setMeals(prev => prev.map(m => m.type === type ? { ...m, items: [...m.items, ...picks] } : m));
        close();
      };

      const filtered = FOOD_RESULTS.filter(f => !q || f.name.toLowerCase().includes(q.toLowerCase()) || (f.brand || "").toLowerCase().includes(q.toLowerCase()));

      return (
        <>
          {meals.map(m => <MealSection key={m.type} meal={m} onAdd={openAdd} onDel={delItem} />)}

          {sheet && (
            <div className="sheet-backdrop" onClick={close}>
              <div className="sheet" onClick={(e) => e.stopPropagation()}>
                <div className="sheet-handle"/>
                <div className="sheet-head">
                  <h3>Add to {MEAL_LABELS[sheet.type]}</h3>
                  <button className="btn ghost icon sm" onClick={close} aria-label="Close">×</button>
                </div>
                <div className="sheet-tabs">
                  {["search", "scan", "photo"].map(t => (
                    <button key={t} className={sheet.tab === t ? "active" : ""} onClick={() => setSheet({ ...sheet, tab: t })}>
                      {t === "search" ? "Search" : t === "scan" ? "Scan barcode" : "Photo"}
                    </button>
                  ))}
                </div>

                <div className="sheet-body">
                  {sheet.tab === "search" && (
                    <>
                      <div className="search-box">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5" strokeLinecap="round"/></svg>
                        <input autoFocus placeholder="Search foods, brands, recent…" value={q} onChange={(e) => setQ(e.target.value)} />
                      </div>
                      <div style={{ fontSize: 11, color: "var(--color-text-tertiary)", textTransform: "uppercase", letterSpacing: ".08em", fontWeight: 600, marginBottom: 4 }}>Suggestions</div>
                      {filtered.map(f => (
                        <div key={f.name} className="food-row" onClick={() => addItem(sheet.type, {
                          name: f.name, brand: f.brand, grams: 100, kcal: f.kcal_100, p: f.p_100, c: f.c_100, f: f.f_100, source: f.src
                        })}>
                          <div>
                            <div className="nm">{f.name}</div>
                            <div className="meta">{f.brand} · per 100 g</div>
                          </div>
                          <div className="nums">
                            <div>{f.kcal_100} kcal</div>
                            <div style={{ fontSize: 11, color: "var(--color-text-tertiary)" }}>{f.p_100}p · {f.c_100}c · {f.f_100}f</div>
                          </div>
                        </div>
                      ))}
                      {filtered.length === 0 && (
                        <div style={{ padding: 24, textAlign: "center", color: "var(--color-text-tertiary)" }}>
                          No matches. <a style={{ color: "var(--color-accent)" }}>Add as custom food</a>
                        </div>
                      )}
                    </>
                  )}

                  {sheet.tab === "scan" && (
                    <>
                      <div className="scanner"><div className="frame"></div></div>
                      <div style={{ textAlign: "center", marginTop: 14, fontSize: 13, color: "var(--color-text-secondary)" }}>
                        Hold the barcode steady inside the frame.
                      </div>
                      <div style={{ marginTop: 16, padding: 14, background: var_("--color-accent-soft"), borderRadius: 10, fontSize: 13, color: "var(--color-text)" }}>
                        Got <b>Optimum Nutrition Whey · 30 g</b> · 117 kcal · 24p
                        <button className="btn sm" style={{ marginTop: 10 }} onClick={() => addItem(sheet.type, { name: "Whey isolate, vanilla", brand: "Optimum Nutrition", grams: 30, kcal: 117, p: 24, c: 2, f: 1, source: "barcode" })}>
                          Add to {MEAL_LABELS[sheet.type].toLowerCase()}
                        </button>
                      </div>
                    </>
                  )}

                  {sheet.tab === "photo" && (
                    <>
                      <div className="photo-frame"><div className="ph">Drop or capture a photo</div></div>
                      <div style={{ fontSize: 12, color: "var(--color-text-tertiary)", margin: "12px 4px 4px" }}>
                        Ollama vision (local) returned 4 candidates · review &amp; save
                      </div>
                      <div className="photo-suggested">
                        {photoItems.map((it, i) => (
                          <div key={it.name} className="item">
                            <div>
                              <div className="nm">{it.name}</div>
                              <div className="meta">{Math.round(it.confidence * 100)}% confidence · {it.kcal} kcal · {it.p}p {it.c}c {it.f}f</div>
                            </div>
                            <input className="qty-input" value={it.grams} onChange={(e) => setPhotoGrams(i, e.target.value)} />
                            <span className={`cb ${it.on ? "on" : ""}`} onClick={() => togglePhoto(i)}>
                              {it.on && <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round"><path d="M5 12l5 5 10-12"/></svg>}
                            </span>
                          </div>
                        ))}
                      </div>
                      <div style={{ display: "flex", justifyContent: "space-between", marginTop: 16 }}>
                        <button className="btn ghost sm" onClick={close}>Cancel</button>
                        <button className="btn" onClick={savePhoto}>Add {photoItems.filter(x => x.on).length} items</button>
                      </div>
                    </>
                  )}
                </div>
              </div>
            </div>
          )}
        </>
      );
    }
    // tiny CSS var helper for inline jsx style usage
    function var_(name) { return getComputedStyle(document.documentElement).getPropertyValue(name); }

    const mount = document.getElementById("meals-mount");
    const root = ReactDOM.createRoot(mount);
    root.render(<App />);
  </script>
</body>
</html>
