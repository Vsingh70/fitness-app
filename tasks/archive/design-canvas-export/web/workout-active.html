<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Push A · in progress · gym</title>
  <link rel="stylesheet" href="assets/tokens.css" />
  <link rel="stylesheet" href="assets/app.css" />
  <style>
    body { padding-bottom: 100px; }

    /* Session header */
    .session-head {
      padding: 24px 28px;
      background: var(--color-surface);
      border-bottom: 1px solid var(--color-border);
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 24px;
      align-items: center;
    }
    .session-head .lab { font-size: 11px; color: var(--color-text-tertiary); text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; }
    .session-head .ti { font-family: var(--font-rounded); font-size: 24px; font-weight: 600; letter-spacing: -0.01em; margin-top: 4px; }
    .session-head .meta { font-size: 12px; color: var(--color-text-secondary); margin-top: 4px; }
    .session-head .timer-big { font-family: var(--font-rounded); font-size: 30px; font-weight: 600; font-variant-numeric: tabular-nums; letter-spacing: -0.01em; color: var(--color-text); }
    .session-head .timer-label { font-size: 11px; color: var(--color-text-tertiary); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; }

    /* Exercise nav rail */
    .ex-rail {
      padding: 12px 28px;
      background: var(--color-bg);
      border-bottom: 1px solid var(--color-border);
      display: flex;
      gap: 8px;
      overflow-x: auto;
      position: sticky;
      top: 0;
      z-index: 5;
      backdrop-filter: blur(20px);
      background: color-mix(in oklab, var(--color-bg) 88%, transparent);
    }
    .ex-rail .pill {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      font-size: 13px; color: var(--color-text-secondary);
      cursor: pointer;
      transition: var(--motion-fast);
      white-space: nowrap;
      flex: 0 0 auto;
    }
    .ex-rail .pill.active { background: var(--color-accent); color: var(--color-accent-foreground); border-color: transparent; font-weight: 600; }
    .ex-rail .pill.done { background: var(--color-success-soft); color: var(--color-success); border-color: transparent; }
    .ex-rail .pill .ix { font-family: var(--font-rounded); font-size: 11px; opacity: 0.6; font-variant-numeric: tabular-nums; }

    /* Exercise card */
    .work-shell { padding: 24px 28px; max-width: 900px; margin: 0 auto; }
    .ex-card { padding: 0; margin-bottom: 16px; overflow: hidden; }
    .ex-card-head {
      padding: 18px 20px;
      border-bottom: 1px solid var(--color-border);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: start;
    }
    .ex-card-head .ti { font-family: var(--font-rounded); font-size: 20px; font-weight: 600; letter-spacing: -0.01em; }
    .ex-card-head .meta { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
    .ex-card-head .progress { font-family: var(--font-rounded); font-size: 13px; font-weight: 600; color: var(--color-text-secondary); font-variant-numeric: tabular-nums; }

    /* Set table */
    .sets {
      padding: 8px 12px 12px;
    }
    .sets .head-row {
      display: grid;
      grid-template-columns: 36px 92px 1fr 1fr 80px 80px 32px;
      gap: 8px;
      padding: 4px 8px 8px;
      font-size: 10px;
      text-transform: uppercase;
      color: var(--color-text-tertiary);
      letter-spacing: 0.08em;
      font-weight: 600;
    }
    .sets .row {
      display: grid;
      grid-template-columns: 36px 92px 1fr 1fr 80px 80px 32px;
      gap: 8px;
      padding: 6px 8px;
      align-items: center;
      border-radius: 10px;
      transition: var(--motion-fast);
    }
    .sets .row + .row { margin-top: 2px; }
    .sets .row.done { background: var(--color-success-soft); }
    .sets .row.current { background: var(--color-accent-soft); }
    .sets .row.pending { background: transparent; }
    .sets .ix { font-family: var(--font-rounded); font-size: 14px; font-weight: 600; color: var(--color-text-secondary); text-align: center; }
    .sets .prev { font-size: 11px; color: var(--color-text-tertiary); font-variant-numeric: tabular-nums; padding-left: 4px; }
    .sets input.numeric {
      height: 38px;
      font-family: var(--font-rounded);
      font-variant-numeric: tabular-nums;
      font-weight: 600;
      font-size: 15px;
      text-align: center;
      background: var(--color-surface-elevated);
      border: 1px solid var(--color-border);
      border-radius: 8px;
      width: 100%;
      color: var(--color-text);
    }
    .sets .row.done input.numeric { background: transparent; border-color: transparent; font-weight: 700; color: var(--color-success); }
    .sets .row.current input.numeric { border-color: var(--color-accent); }
    .sets input.numeric:focus { outline: none; box-shadow: 0 0 0 3px var(--color-accent-soft); border-color: var(--color-accent); }
    .sets .rpe-btn {
      height: 38px; padding: 0; width: 100%;
      border-radius: 8px; border: 1px solid var(--color-border);
      background: var(--color-surface-elevated);
      font-family: var(--font-rounded); font-weight: 600; font-size: 14px; font-variant-numeric: tabular-nums;
      color: var(--color-text-secondary); cursor: pointer;
    }
    .sets .rpe-btn.set { color: var(--color-text); }
    .sets .row.done .rpe-btn { background: transparent; border-color: transparent; }
    .sets .check-btn {
      width: 32px; height: 32px; border-radius: 999px;
      border: 1.5px solid var(--color-border);
      background: var(--color-surface-elevated);
      display: grid; place-items: center; cursor: pointer; transition: var(--motion-fast);
      color: var(--color-text-tertiary);
    }
    .sets .check-btn:hover { border-color: var(--color-accent); color: var(--color-accent); }
    .sets .row.done .check-btn { background: var(--color-success); border-color: transparent; color: white; }

    .add-set {
      margin-top: 8px;
      width: 100%;
      padding: 10px;
      background: transparent;
      border: 1px dashed var(--color-border-strong);
      color: var(--color-text-tertiary);
      border-radius: 10px;
      font-weight: 500; font-size: 13px;
      cursor: pointer;
      transition: var(--motion-fast);
      font-family: inherit;
    }
    .add-set:hover { border-color: var(--color-accent); color: var(--color-accent); background: var(--color-accent-soft); }

    /* Rest timer overlay (sticky bar) */
    .sticky-bar {
      position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
      max-width: 540px; width: calc(100% - 32px);
      background: var(--color-surface-elevated);
      border: 1px solid var(--color-border);
      box-shadow: var(--shadow-3);
      border-radius: 18px;
      padding: 12px 14px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 14px;
      align-items: center;
      z-index: 30;
    }
    .sticky-bar .ring { width: 52px; height: 52px; position: relative; }
    .sticky-bar .ring svg { transform: rotate(-90deg); }
    .sticky-bar .ring .num { position: absolute; inset: 0; display: grid; place-items: center; font-family: var(--font-rounded); font-size: 14px; font-weight: 600; font-variant-numeric: tabular-nums; }
    .sticky-bar .ti { font-size: 13px; font-weight: 600; }
    .sticky-bar .sub { font-size: 11px; color: var(--color-text-tertiary); }
    .sticky-bar.idle { background: var(--color-surface); }

    /* RPE picker popover */
    .rpe-pop {
      position: absolute;
      background: var(--color-surface-elevated);
      border: 1px solid var(--color-border);
      border-radius: 14px;
      padding: 10px;
      box-shadow: var(--shadow-3);
      z-index: 40;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      min-width: 220px;
    }
    .rpe-pop button {
      padding: 10px 8px;
      border: 1px solid var(--color-border);
      background: var(--color-surface);
      font-family: var(--font-rounded);
      font-weight: 600;
      font-size: 14px;
      border-radius: 8px;
      cursor: pointer;
      font-variant-numeric: tabular-nums;
      color: var(--color-text);
    }
    .rpe-pop button:hover { background: var(--color-accent-soft); border-color: var(--color-accent); color: var(--color-accent); }

    /* Shortcut sheet */
    .sheet-backdrop {
      position: fixed; inset: 0; background: var(--color-overlay);
      backdrop-filter: blur(4px);
      z-index: 50;
      display: grid; place-items: center;
      padding: 24px;
    }
    .sheet {
      background: var(--color-surface-elevated);
      border-radius: var(--radius-sheet);
      max-width: 480px; width: 100%;
      box-shadow: var(--shadow-3);
      padding: 24px;
    }
    .sheet h3 { margin: 0 0 16px; font-size: 18px; font-weight: 600; letter-spacing: -0.01em; }
    .sheet .kb-row { display: grid; grid-template-columns: 110px 1fr; gap: 12px; padding: 8px 0; font-size: 13px; border-bottom: 1px solid var(--color-border); }
    .sheet .kb-row:last-child { border-bottom: none; }
    .sheet kbd {
      font-family: var(--font-mono); font-size: 11px;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 4px;
      padding: 2px 6px;
      box-shadow: 0 1px 0 var(--color-border-strong);
      color: var(--color-text);
    }

    /* Plate math */
    .plate-strip {
      display: flex; gap: 4px; align-items: center; justify-content: center;
      padding: 8px;
      background: var(--color-surface);
      border-radius: 8px;
      margin-top: 8px;
    }
    .plate {
      font-family: var(--font-rounded); font-size: 10px; font-weight: 700;
      color: white;
      width: 16px; padding: 2px 0;
      border-radius: 2px;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }
    .plate.x20 { background: #d52424; height: 36px; }
    .plate.x15 { background: #ffd23a; color: oklch(0.30 0.05 80); height: 34px; }
    .plate.x10 { background: #2da94d; height: 32px; }
    .plate.x5  { background: oklch(0.5 0 0); height: 28px; width: 14px; }
    .plate.x25 { background: var(--color-text-tertiary); height: 24px; width: 12px; }
    .plate.bar { width: 32px; height: 6px; background: var(--color-text-tertiary); border-radius: 1px; }
    .plate.col { background: var(--color-text-tertiary); width: 4px; height: 12px; }
    .plate-strip .lab { font-family: var(--font-mono); font-size: 10px; color: var(--color-text-tertiary); margin-left: 8px; }

    @media (max-width: 700px) {
      .session-head { grid-template-columns: 1fr auto; padding: 16px 16px; }
      .session-head .timer-big { font-size: 22px; }
      .session-head .actions { grid-column: span 2; display: flex; justify-content: space-between; }
      .work-shell { padding: 16px; }
      .sets .head-row, .sets .row { grid-template-columns: 28px 60px 1fr 1fr 56px 56px 28px; gap: 6px; }
      .sets input.numeric { font-size: 13px; height: 36px; }
    }
  </style>
</head>
<body data-page="workouts">
  <div id="root"></div>
  <script src="assets/data.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" data-presets="env,react">
    const { useState, useEffect, useRef, useMemo } = React;
    const SESSION = window.MOCK.active_session;

    function fmtMMSS(s) {
      s = Math.max(0, Math.floor(s));
      const m = Math.floor(s / 60);
      const r = s % 60;
      return `${m}:${r.toString().padStart(2, "0")}`;
    }
    function fmtHMS(s) {
      s = Math.max(0, Math.floor(s));
      const h = Math.floor(s / 3600);
      const m = Math.floor((s % 3600) / 60);
      const ss = s % 60;
      if (h > 0) return `${h}:${m.toString().padStart(2, "0")}:${ss.toString().padStart(2, "0")}`;
      return `${m}:${ss.toString().padStart(2, "0")}`;
    }

    function SessionTimer({ start }) {
      const [t, setT] = useState(0);
      useEffect(() => {
        const id = setInterval(() => setT(Math.floor((Date.now() - start) / 1000)), 1000);
        return () => clearInterval(id);
      }, [start]);
      return <span className="timer-big">{fmtHMS(t)}</span>;
    }

    function RestRing({ remaining, total }) {
      const RAD = 22;
      const C = 2 * Math.PI * RAD;
      const frac = Math.max(0, Math.min(1, remaining / total));
      const off = C * (1 - frac);
      return (
        <div className="ring">
          <svg width="52" height="52" viewBox="0 0 52 52">
            <circle cx="26" cy="26" r={RAD} fill="none" stroke="var(--color-border)" strokeWidth="4"/>
            <circle cx="26" cy="26" r={RAD} fill="none" stroke="var(--color-accent)" strokeWidth="4" strokeLinecap="round" strokeDasharray={C} strokeDashoffset={off}/>
          </svg>
          <div className="num">{remaining > 0 ? Math.ceil(remaining) : "—"}</div>
        </div>
      );
    }

    function PlateStrip({ weight }) {
      // Compute plates needed per side from weight, assuming 20kg bar.
      const bar = 20;
      const each = Math.max(0, (weight - bar) / 2);
      const order = [20, 15, 10, 5, 2.5, 1.25];
      let rem = each;
      const plates = [];
      for (const p of order) {
        while (rem >= p - 1e-6) { plates.push(p); rem = +(rem - p).toFixed(3); }
      }
      const cls = {20:"x20",15:"x15",10:"x10",5:"x5",2.5:"x25",1.25:"x25"};
      return (
        <div className="plate-strip">
          <span className="plate col"/>
          {plates.slice().reverse().map((p, i) => <span key={i} className={`plate ${cls[p]}`}>{p}</span>)}
          <span className="plate bar"/>
          <span className="plate bar"/>
          {plates.map((p, i) => <span key={"r"+i} className={`plate ${cls[p]}`}>{p}</span>)}
          <span className="plate col"/>
          <span className="lab">{weight} kg · per side {each} kg</span>
        </div>
      );
    }

    function App() {
      // local state, initialised from MOCK
      const [exercises, setExercises] = useState(() => SESSION.exercises.map(e => ({
        ...e,
        sets: e.sets.map(s => ({ ...s }))
      })));
      const [activeExIdx, setActiveExIdx] = useState(0);
      const [rest, setRest] = useState({ active: false, total: 0, remaining: 0 });
      const [rpePop, setRpePop] = useState(null); // { exIdx, setIdx, x, y }
      const [showShortcuts, setShowShortcuts] = useState(false);
      const sessionStart = useRef(Date.now() - 8 * 60 * 1000); // started 8 min ago

      // rest timer
      useEffect(() => {
        if (!rest.active) return;
        const id = setInterval(() => {
          setRest(r => {
            const next = r.remaining - 1;
            if (next <= 0) return { active: false, total: r.total, remaining: 0 };
            return { ...r, remaining: next };
          });
        }, 1000);
        return () => clearInterval(id);
      }, [rest.active]);

      // keyboard shortcuts
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === "?" || (e.shiftKey && e.key === "/")) { setShowShortcuts(s => !s); }
          if (e.key === "Escape") { setShowShortcuts(false); setRpePop(null); }
          if (e.key === "j") { setActiveExIdx(i => Math.min(exercises.length - 1, i + 1)); }
          if (e.key === "k") { setActiveExIdx(i => Math.max(0, i - 1)); }
        };
        window.addEventListener("keydown", onKey);
        return () => window.removeEventListener("keydown", onKey);
      }, [exercises]);

      const ex = exercises[activeExIdx];

      function toggleSetDone(exIdx, setIdx) {
        setExercises(prev => {
          const next = prev.map(e => ({ ...e, sets: e.sets.map(s => ({ ...s })) }));
          const s = next[exIdx].sets[setIdx];
          s.done = !s.done;
          s.synced = s.done; // optimistic
          if (s.done && next[exIdx].rest_sec) {
            setRest({ active: true, total: next[exIdx].rest_sec, remaining: next[exIdx].rest_sec });
          }
          return next;
        });
      }

      function updateField(exIdx, setIdx, key, val) {
        setExercises(prev => {
          const next = prev.map(e => ({ ...e, sets: e.sets.map(s => ({ ...s })) }));
          next[exIdx].sets[setIdx][key] = val;
          return next;
        });
      }

      function addSet(exIdx) {
        setExercises(prev => {
          const next = prev.map(e => ({ ...e, sets: e.sets.map(s => ({ ...s })) }));
          const lastWeight = next[exIdx].sets[next[exIdx].sets.length - 1]?.weight || 0;
          next[exIdx].sets.push({ id: `s${Date.now()}`, weight: lastWeight, reps: 0, rpe: 0, done: false, synced: false });
          return next;
        });
      }

      const completedSets = exercises.flatMap(e => e.sets.filter(s => s.done)).length;
      const totalSets = exercises.flatMap(e => e.sets).length;

      function openRpe(exIdx, setIdx, btn) {
        const r = btn.getBoundingClientRect();
        setRpePop({ exIdx, setIdx, x: r.right - 220, y: r.bottom + 8 });
      }
      function pickRpe(v) {
        if (rpePop) updateField(rpePop.exIdx, rpePop.setIdx, "rpe", v);
        setRpePop(null);
      }

      return (
        <>
          {/* Session header */}
          <div className="session-head">
            <div>
              <div className="lab">In progress · Tuesday, May 27</div>
              <div className="ti">Push A · Week 4</div>
              <div className="meta">{completedSets} of {totalSets} sets · {exercises.length} exercises</div>
            </div>
            <div style={{ textAlign: "right" }}>
              <div className="timer-label">Elapsed</div>
              <SessionTimer start={sessionStart.current} />
            </div>
            <div className="actions" style={{ display: "flex", gap: 8 }}>
              <button className="btn ghost sm" onClick={() => setShowShortcuts(true)} title="Keyboard shortcuts (?)">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="6" width="20" height="12" rx="3"/><path d="M6 10v.01M10 10v.01M14 10v.01M18 10v.01M6 14h12"/></svg>
                ?
              </button>
              <a className="btn secondary sm" href="workout-summary.html">Finish</a>
            </div>
          </div>

          {/* Exercise rail */}
          <div className="ex-rail">
            {exercises.map((e, i) => {
              const done = e.sets.every(s => s.done);
              const cls = `pill ${i === activeExIdx ? "active" : (done ? "done" : "")}`;
              return (
                <button key={e.id} className={cls} onClick={() => setActiveExIdx(i)}>
                  <span className="ix">0{i+1}</span>
                  <span>{e.name}</span>
                  <span className="ix">{e.sets.filter(s => s.done).length}/{e.sets.length}</span>
                </button>
              );
            })}
          </div>

          {/* Active exercise card */}
          <div className="work-shell">
            <div className="card ex-card">
              <div className="ex-card-head">
                <div>
                  <div className="ti">{ex.name}</div>
                  <div className="meta">
                    <span className="chip accent">{ex.muscle.replace("_", " ")}</span>
                    <span className="chip muted">{ex.equipment}</span>
                    <span className="chip muted">{ex.target}</span>
                    <span className="chip muted">Rest {fmtMMSS(ex.rest_sec)}</span>
                  </div>
                </div>
                <div style={{ textAlign: "right" }}>
                  <div className="progress">{ex.sets.filter(s => s.done).length} / {ex.sets.length} sets</div>
                  <div style={{ fontSize: 11, color: "var(--color-text-tertiary)", marginTop: 4 }}>
                    Last: {ex.previous?.[0] ? `${ex.previous[0].weight} × ${ex.previous[0].reps}` : "—"}
                  </div>
                </div>
              </div>

              {ex.tracking === "weight_reps" && ex.equipment === "barbell" && ex.sets.length > 0 && (
                <PlateStrip weight={ex.sets.find(s => !s.done)?.weight || ex.sets[0].weight} />
              )}

              <div className="sets">
                <div className="head-row">
                  <span>Set</span>
                  <span>Previous</span>
                  <span>Weight (kg)</span>
                  <span>Reps</span>
                  <span>RPE</span>
                  <span></span>
                  <span></span>
                </div>
                {ex.sets.map((s, i) => {
                  const cls = "row " + (s.done ? "done" : (i === ex.sets.findIndex(x => !x.done) ? "current" : "pending"));
                  const prev = ex.previous?.[i];
                  return (
                    <div key={s.id} className={cls}>
                      <span className="ix">{i + 1}</span>
                      <span className="prev">{prev ? `${prev.weight} × ${prev.reps}` : "—"}</span>
                      <input className="numeric" inputMode="decimal" value={s.weight || ""} placeholder="0"
                        onChange={(e) => updateField(activeExIdx, i, "weight", +e.target.value || 0)} disabled={s.done}/>
                      <input className="numeric" inputMode="numeric" value={s.reps || ""} placeholder="0"
                        onChange={(e) => updateField(activeExIdx, i, "reps", +e.target.value || 0)} disabled={s.done}/>
                      <button className={`rpe-btn ${s.rpe ? "set" : ""}`} disabled={s.done}
                        onClick={(e) => openRpe(activeExIdx, i, e.currentTarget)}>
                        {s.rpe || "—"}
                      </button>
                      <span style={{ fontSize: 11, color: s.synced ? "var(--color-success)" : "var(--color-text-tertiary)", textAlign: "right" }}>
                        {s.done ? (s.synced ? "synced" : "pending") : ""}
                      </span>
                      <button className="check-btn" aria-label={s.done ? "Mark incomplete" : "Mark complete"} onClick={() => toggleSetDone(activeExIdx, i)}>
                        {s.done
                          ? <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12l5 5 10-12"/></svg>
                          : <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="9"/></svg>}
                      </button>
                    </div>
                  );
                })}
                <button className="add-set" onClick={() => addSet(activeExIdx)}>+ Add set</button>
              </div>
            </div>

            {/* Next-up preview */}
            {exercises[activeExIdx + 1] && (
              <div className="card" style={{ padding: 14, display: "flex", alignItems: "center", gap: 12, opacity: 0.85 }}>
                <span style={{ fontSize: 11, color: "var(--color-text-tertiary)", textTransform: "uppercase", letterSpacing: ".08em", fontWeight: 600 }}>Up next</span>
                <span style={{ fontSize: 14, fontWeight: 600 }}>{exercises[activeExIdx + 1].name}</span>
                <span style={{ fontSize: 12, color: "var(--color-text-tertiary)" }}>· {exercises[activeExIdx + 1].target}</span>
                <button style={{ marginLeft: "auto" }} className="btn ghost sm" onClick={() => setActiveExIdx(i => i + 1)}>Skip ahead →</button>
              </div>
            )}
          </div>

          {/* Sticky rest timer / progress */}
          <div className={`sticky-bar ${rest.active ? "" : "idle"}`}>
            {rest.active
              ? <RestRing remaining={rest.remaining} total={rest.total} />
              : <div style={{ width: 52, height: 52, display: "grid", placeItems: "center", color: "var(--color-text-tertiary)" }}>
                  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
                </div>}
            <div>
              <div className="ti">{rest.active ? "Resting" : "No rest active"}</div>
              <div className="sub">{rest.active ? `${fmtMMSS(rest.remaining)} of ${fmtMMSS(rest.total)} · auto-started after set ✓` : `Default rest ${fmtMMSS(ex.rest_sec)}`}</div>
            </div>
            <div style={{ display: "flex", gap: 8 }}>
              {rest.active
                ? <>
                    <button className="btn ghost sm" onClick={() => setRest(r => ({ ...r, remaining: r.remaining + 30 }))}>+30s</button>
                    <button className="btn secondary sm" onClick={() => setRest({ active: false, total: 0, remaining: 0 })}>Skip</button>
                  </>
                : <button className="btn sm" onClick={() => setRest({ active: true, total: ex.rest_sec, remaining: ex.rest_sec })}>Start rest</button>}
            </div>
          </div>

          {/* RPE popover */}
          {rpePop && (
            <>
              <div style={{ position: "fixed", inset: 0, zIndex: 39 }} onClick={() => setRpePop(null)} />
              <div className="rpe-pop" style={{ left: rpePop.x, top: rpePop.y }}>
                {[6, 6.5, 7, 7.5, 8, 8.5, 9, 9.5].map(v => (
                  <button key={v} onClick={() => pickRpe(v)}>{v}</button>
                ))}
                <button style={{ gridColumn: "span 4", marginTop: 4 }} onClick={() => pickRpe(0)}>Clear</button>
              </div>
            </>
          )}

          {/* Shortcuts sheet */}
          {showShortcuts && (
            <div className="sheet-backdrop" onClick={() => setShowShortcuts(false)}>
              <div className="sheet" onClick={(e) => e.stopPropagation()}>
                <h3>Keyboard shortcuts</h3>
                <div className="kb-row"><div><kbd>j</kbd> / <kbd>k</kbd></div><div>Next / previous exercise</div></div>
                <div className="kb-row"><div><kbd>Tab</kbd></div><div>Next input within a set row</div></div>
                <div className="kb-row"><div><kbd>⌘</kbd> <kbd>↵</kbd></div><div>Mark current set complete</div></div>
                <div className="kb-row"><div><kbd>r</kbd></div><div>Start / reset rest timer</div></div>
                <div className="kb-row"><div><kbd>?</kbd></div><div>This sheet</div></div>
                <div className="kb-row"><div><kbd>Esc</kbd></div><div>Close sheets &amp; popovers</div></div>
                <div style={{ display: "flex", justifyContent: "flex-end", marginTop: 16 }}>
                  <button className="btn secondary sm" onClick={() => setShowShortcuts(false)}>Got it</button>
                </div>
              </div>
            </div>
          )}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
  <script>
    // Apply tweaks (theme/accent) without rendering the full chrome — workout is its own immersive view
    (function () {
      const theme = localStorage.getItem("om.theme") || "system";
      const accent = localStorage.getItem("om.accent") || "blue";
      if (theme !== "system") document.documentElement.setAttribute("data-theme", theme);
      document.documentElement.setAttribute("data-accent", accent);
    })();
  </script>
</body>
</html>
